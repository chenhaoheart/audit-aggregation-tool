var sectionDataName = "塔尔镇半沟村（下半沟村）_药草沟CS041";
var coordData = {"series": []};
var retryCount = 0;

function sectionTooltipFormatter(params) {
  var p = params[0];
  var idx = p.dataIndex;
  var pt = sectionDataPoints[idx];
  var html = '<b>' + sectionDataName + '</b><br/>';
  html += '序号: #' + (pt.seq || (idx + 1)) + '<br/>';
  html += '起点距: ' + pt.distance.toFixed(3) + ' m<br/>';
  html += '高程: ' + pt.elevation.toFixed(3) + ' m';
  if (pt.lon && pt.lat) {
    html += '<br/>经度: ' + pt.lon.toFixed(6) + '°';
    html += '<br/>纬度: ' + pt.lat.toFixed(6) + '°';
  }
  if (pt.feature_desc) html += '<br/>特征: ' + pt.feature_desc;
  if (pt.isFeature) html += '<br/><span style="color:#fb7185;">★ 特征点</span>';
  return html;
}

function coordTooltipFormatter(params) {
  var d = params.data;
  if (!d || !d.value) return '';
  var html = '<b>测量点 #' + (d.seq || '?') + '</b><br/>';
  html += '经度: ' + d.value[0].toFixed(6) + '°<br/>';
  html += '纬度: ' + d.value[1].toFixed(6) + '°<br/>';
  html += '起点距: ' + (d.distance || 0).toFixed(3) + ' m<br/>';
  html += '高程: ' + (d.elevation || 0).toFixed(3) + ' m';
  if (d.feature) html += '<br/>特征: ' + d.feature;
  if (d.isFeature) html += '<br/><span style="color:#fb7185;">★ 特征点</span>';
  return html;
}

function initCharts() {
  if (typeof echarts === 'undefined') {
    if (retryCount < 3) {
      retryCount++;
      document.getElementById('sectionChart').innerHTML = '<div class="no-data">ECharts 加载中... (重试 ' + retryCount + '/3)</div>';
      setTimeout(initCharts, 1500);
      return;
    }
    document.getElementById('sectionChart').innerHTML = '<div class="no-data">ECharts 加载失败，请检查网络连接或将 echarts.min.js 放到 assets/js/ 目录下</div>';
    return;
  }
  var secDom = document.getElementById('sectionChart');
  var coordDom = document.getElementById('coordChart');
  if (!secDom || !coordDom) return;

  var secChart = echarts.init(secDom, null, {renderer: 'canvas'});
  if (sectionData.tooltip) {
    sectionData.tooltip.formatter = sectionTooltipFormatter;
  }
  secChart.setOption(sectionData);

  if (coordData.series && coordData.series.length > 0) {
    var coordChart = echarts.init(coordDom, null, {renderer: 'canvas'});
    if (coordData.tooltip) {
      coordData.tooltip.formatter = coordTooltipFormatter;
    }
    if (coordData.series[1] && coordData.series[1].label) {
      coordData.series[1].label.formatter = function(params) { return '#' + (params.data.seq || '?'); };
    }
    coordChart.setOption(coordData);
  } else {
    coordDom.innerHTML = '<div class="no-data">无经纬度数据</div>';
  }

  window.addEventListener('resize', function() {
    secChart.resize();
    try { coordChart && coordChart.resize(); } catch(e) {}
  });
}

if (typeof echarts !== 'undefined') {
  initCharts();
} else {
  document.getElementById('sectionChart').innerHTML = '<div class="no-data">ECharts 加载中...</div>';
  var script = document.querySelector('script[src*="echarts"]');
  if (script) {
    script.onload = function() { retryCount = 0; initCharts(); };
    script.onerror = function() {
      var fallback = document.createElement('script');
      fallback.src = 'https://registry.npmmirror.com/echarts/5.5.0/files/dist/echarts.min.js';
      fallback.onload = function() { retryCount = 0; initCharts(); };
      fallback.onerror = function() { initCharts(); };
      document.head.appendChild(fallback);
    };
  }
  setTimeout(initCharts, 3000);
}
